version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: genesis_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=genesis
      - POSTGRES_PASSWORD=genesis_pass
      - POSTGRES_DB=genesis_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: genesis_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: genesis_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://genesis:genesis_pass@db:5432/genesis_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

volumes:
  postgres_data:
